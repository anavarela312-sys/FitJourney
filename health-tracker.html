<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitJourney — Ana & João</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ana: #E8A598;
    --ana-deep: #C4736A;
    --ana-light: #F7E8E6;
    --joao: #7BA7C2;
    --joao-deep: #4A7A9B;
    --joao-light: #E3EFF5;
    --bg: #F5F0EB;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --text-soft: #6B6B6B;
    --border: #E8E0D8;
    --gold: #D4A827;
    --green: #5A9E6F;
    --red: #C45C5C;
    --radius: 16px;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--text);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .header h1 span { color: var(--ana); }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--card);
    border-bottom: 2px solid var(--border);
    padding: 0 16px;
    overflow-x: auto;
    gap: 4px;
  }
  .tab {
    padding: 14px 20px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    border: none;
    background: none;
    cursor: pointer;
    color: var(--text-soft);
    white-space: nowrap;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }
  .tab:hover { color: var(--text); }

  /* MAIN */
  .main { padding: 20px 16px; max-width: 800px; margin: 0 auto; }

  /* USER SELECTOR */
  .user-selector {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }
  .user-btn {
    flex: 1;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--card);
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    transition: all 0.2s;
    text-align: center;
  }
  .user-btn.ana { border-color: var(--ana); color: var(--ana-deep); background: var(--ana-light); }
  .user-btn.joao { border-color: var(--joao); color: var(--joao-deep); background: var(--joao-light); }
  .user-btn:not(.ana):not(.joao):hover { border-color: #aaa; }

  /* CARD */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-soft);
    margin-bottom: 16px;
  }

  /* MACRO BARS */
  .macro-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .macro-item { }
  .macro-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-soft);
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
  }
  .macro-bar-bg {
    height: 8px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .macro-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.6s ease;
  }
  .macro-value {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 22px;
    margin-bottom: 2px;
  }
  .macro-target { font-size: 11px; color: var(--text-soft); }

  /* KCAL CIRCLE */
  .kcal-display {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
  }
  .kcal-circle {
    position: relative;
    width: 100px;
    height: 100px;
    flex-shrink: 0;
  }
  .kcal-circle svg { transform: rotate(-90deg); }
  .kcal-circle-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .kcal-circle-text .big {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    line-height: 1;
  }
  .kcal-circle-text .small { font-size: 10px; color: var(--text-soft); }
  .kcal-info h3 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
  }
  .kcal-info p { font-size: 13px; color: var(--text-soft); margin-top: 4px; }

  /* FORM */
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-soft);
    margin-bottom: 6px;
  }
  .form-input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    transition: border-color 0.2s;
  }
  .form-input:focus { outline: none; border-color: var(--text); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  /* BUTTONS */
  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-dark { background: var(--text); color: #fff; }
  .btn-dark:hover { background: #333; }
  .btn-ana { background: var(--ana); color: #fff; }
  .btn-ana:hover { background: var(--ana-deep); }
  .btn-joao { background: var(--joao); color: #fff; }
  .btn-joao:hover { background: var(--joao-deep); }

  /* BADGE */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-green { background: #E8F5ED; color: var(--green); }
  .badge-red { background: #F5E8E8; color: var(--red); }
  .badge-gold { background: #FDF5E0; color: var(--gold); }
  .badge-blue { background: var(--joao-light); color: var(--joao-deep); }

  /* HISTORY TABLE */
  .history-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }
  .history-row:last-child { border-bottom: none; }
  .history-date { font-size: 12px; color: var(--text-soft); min-width: 60px; }
  .history-kcal { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; }
  .history-macros { font-size: 11px; color: var(--text-soft); flex: 1; text-align: center; }

  /* WEIGHT SECTION */
  .weight-display {
    text-align: center;
    padding: 20px 0;
  }
  .weight-big {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 52px;
    line-height: 1;
  }
  .weight-big span { font-size: 24px; font-weight: 400; color: var(--text-soft); }
  .weight-delta {
    font-size: 14px;
    margin-top: 8px;
    font-weight: 500;
  }
  .weight-progress {
    margin-top: 20px;
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-soft);
    margin-bottom: 8px;
  }
  .progress-bar-bg {
    height: 12px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.8s ease;
  }

  /* GAMIFICATION */
  .achievements-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .achievement {
    text-align: center;
    padding: 16px 8px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--bg);
    transition: all 0.2s;
  }
  .achievement.unlocked {
    background: var(--card);
    border-color: var(--gold);
    box-shadow: 0 2px 12px rgba(212,168,39,0.15);
  }
  .achievement-icon { font-size: 28px; margin-bottom: 6px; }
  .achievement-name { font-size: 10px; font-weight: 600; color: var(--text-soft); }
  .achievement.unlocked .achievement-name { color: var(--text); }

  .streak-display {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px;
    background: var(--bg);
    border-radius: 12px;
  }
  .streak-icon { font-size: 36px; }
  .streak-info h3 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
    line-height: 1;
  }
  .streak-info p { font-size: 12px; color: var(--text-soft); margin-top: 2px; }

  /* BODY METRICS */
  .metrics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .metric-item {
    padding: 12px;
    background: var(--bg);
    border-radius: 10px;
  }
  .metric-name { font-size: 10px; color: var(--text-soft); font-weight: 500; margin-bottom: 4px; }
  .metric-val { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; }
  .metric-val span { font-size: 11px; font-weight: 400; color: var(--text-soft); }
  .metric-delta { font-size: 10px; margin-top: 2px; }

  /* PANEL */
  .panel { display: none; }
  .panel.active { display: block; }

  /* NOTIFICATION */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--text);
    color: #fff;
    padding: 12px 24px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 500;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .section-header h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
  }

  .empty-state {
    text-align: center;
    padding: 32px;
    color: var(--text-soft);
    font-size: 13px;
  }
  .empty-state .emoji { font-size: 32px; margin-bottom: 8px; }

  .user-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 10px;
    font-weight: 700;
  }
  .user-tag-ana { background: var(--ana-light); color: var(--ana-deep); }
  .user-tag-joao { background: var(--joao-light); color: var(--joao-deep); }

  .vs-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: center;
    margin-bottom: 16px;
  }
  .vs-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: var(--text-soft);
    text-align: center;
  }

  @media (max-width: 480px) {
    .form-row-3 { grid-template-columns: 1fr 1fr; }
    .achievements-grid { grid-template-columns: 1fr 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Fit<span>Journey</span></h1>
  <div style="font-size:12px;color:#888;">Ana & João</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('hoje')">📊 Hoje</button>
  <button class="tab" onclick="showTab('peso')">⚖️ Peso</button>
  <button class="tab" onclick="showTab('historico')">📅 Histórico</button>
  <button class="tab" onclick="showTab('conquistas')">🏆 Conquistas</button>
  <button class="tab" onclick="showTab('duelo')">⚔️ Duelo</button>
</div>

<div class="main">

  <!-- ===== HOJE ===== -->
  <div id="panel-hoje" class="panel active">
    <div class="user-selector">
      <button class="user-btn ana" onclick="setUser('ana')">💗 Ana</button>
      <button class="user-btn joao" onclick="setUser('joao')">💙 João</button>
    </div>

    <div id="hoje-display">
      <!-- dynamically rendered -->
    </div>

    <div class="card">
      <div class="card-title">➕ Registar refeição</div>
      <div class="form-row" style="margin-bottom:14px">
        <div class="form-group" style="margin:0">
          <label class="form-label">Data</label>
          <input type="date" class="form-input" id="meal-date">
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">Refeição</label>
          <select class="form-input" id="meal-type">
            <option>Pequeno-almoço</option>
            <option>Snack manhã</option>
            <option>Almoço</option>
            <option>Lanche tarde</option>
            <option>Jantar</option>
            <option>Extra</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Descrição (opcional)</label>
        <input type="text" class="form-input" id="meal-desc" placeholder="ex: Frango com arroz">
      </div>
      <div class="form-row" style="margin-bottom:14px">
        <div class="form-group" style="margin:0">
          <label class="form-label">Calorias (kcal)</label>
          <input type="number" class="form-input" id="meal-kcal" placeholder="0">
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">Proteína (g)</label>
          <input type="number" class="form-input" id="meal-prot" placeholder="0">
        </div>
      </div>
      <div class="form-row" style="margin-bottom:14px">
        <div class="form-group" style="margin:0">
          <label class="form-label">Gordura (g)</label>
          <input type="number" class="form-input" id="meal-fat" placeholder="0">
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">Hidratos (g)</label>
          <input type="number" class="form-input" id="meal-carbs" placeholder="0">
        </div>
      </div>
      <button class="btn btn-dark" id="add-meal-btn" onclick="addMeal()">Guardar refeição</button>
    </div>
  </div>

  <!-- ===== PESO ===== -->
  <div id="panel-peso" class="panel">
    <div class="user-selector">
      <button class="user-btn ana" onclick="setUser('ana')">💗 Ana</button>
      <button class="user-btn joao" onclick="setUser('joao')">💙 João</button>
    </div>

    <div id="peso-display"></div>

    <div class="card">
      <div class="card-title">📏 Nova pesagem semanal</div>
      <div class="form-group">
        <label class="form-label">Data da pesagem</label>
        <input type="date" class="form-input" id="w-date">
      </div>
      <div class="form-row" style="margin-bottom:14px">
        <div class="form-group" style="margin:0">
          <label class="form-label">Peso (kg)</label>
          <input type="number" step="0.1" class="form-input" id="w-weight" placeholder="75.9">
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">% Gordura</label>
          <input type="number" step="0.1" class="form-input" id="w-fat" placeholder="38.9">
        </div>
      </div>
      <div class="form-row" style="margin-bottom:14px">
        <div class="form-group" style="margin:0">
          <label class="form-label">Massa muscular (kg)</label>
          <input type="number" step="0.1" class="form-input" id="w-muscle" placeholder="43.6">
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">IMC</label>
          <input type="number" step="0.1" class="form-input" id="w-bmi" placeholder="28.6">
        </div>
      </div>
      <div class="form-row" style="margin-bottom:14px">
        <div class="form-group" style="margin:0">
          <label class="form-label">% Água corporal</label>
          <input type="number" step="0.1" class="form-input" id="w-water" placeholder="48.9">
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">BMR (kcal)</label>
          <input type="number" class="form-input" id="w-bmr" placeholder="1372">
        </div>
      </div>
      <div class="form-row" style="margin-bottom:14px">
        <div class="form-group" style="margin:0">
          <label class="form-label">Gordura visceral</label>
          <input type="number" step="0.1" class="form-input" id="w-visceral" placeholder="12">
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">Idade corporal</label>
          <input type="number" class="form-input" id="w-bodyage" placeholder="33">
        </div>
      </div>
      <button class="btn btn-dark" onclick="addWeight()">Guardar pesagem</button>
    </div>
  </div>

  <!-- ===== HISTÓRICO ===== -->
  <div id="panel-historico" class="panel">
    <div class="user-selector">
      <button class="user-btn ana" onclick="setUser('ana')">💗 Ana</button>
      <button class="user-btn joao" onclick="setUser('joao')">💙 João</button>
    </div>
    <div id="historico-display"></div>
  </div>

  <!-- ===== CONQUISTAS ===== -->
  <div id="panel-conquistas" class="panel">
    <div class="user-selector">
      <button class="user-btn ana" onclick="setUser('ana')">💗 Ana</button>
      <button class="user-btn joao" onclick="setUser('joao')">💙 João</button>
    </div>
    <div id="conquistas-display"></div>
  </div>

  <!-- ===== DUELO ===== -->
  <div id="panel-duelo" class="panel">
    <div id="duelo-display"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ==================== STATE ====================
const TARGETS = {
  ana: { kcal: 1800, prot: 142, fat: 55, carbs: 200, startWeight: 75.9, goalWeight: 66 },
  joao: { kcal: 2220, prot: 167, fat: 88, carbs: 187, startWeight: 100, goalWeight: 90 }
};

let currentUser = 'ana';
let state = loadState();

function loadState() {
  try {
    const s = localStorage.getItem('fitjourney_v2');
    if (s) return JSON.parse(s);
  } catch(e) {}
  return {
    ana: { meals: {}, weights: [{ date: '2026-04-27', weight: 75.9, fat: 38.9, muscle: 43.6, bmi: 28.6, water: 48.9, bmr: 1372, visceral: 12, bodyage: 33 }], streak: 0, lastLog: null },
    joao: { meals: {}, weights: [{ date: '2026-04-27', weight: 100, fat: 0, muscle: 0, bmi: 33.4, water: 0, bmr: 0, visceral: 0, bodyage: 0 }], streak: 0, lastLog: null }
  };
}

function saveState() {
  try { localStorage.setItem('fitjourney_v2', JSON.stringify(state)); } catch(e) {}
}

function today() {
  return new Date().toISOString().split('T')[0];
}

function formatDate(d) {
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('pt-PT', { day: '2-digit', month: 'short' });
}

// ==================== TABS ====================
function showTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  event.target.classList.add('active');
  renderAll();
}

function setUser(u) {
  currentUser = u;
  renderAll();
}

// ==================== MEALS ====================
function addMeal() {
  const kcal = parseFloat(document.getElementById('meal-kcal').value) || 0;
  const prot = parseFloat(document.getElementById('meal-prot').value) || 0;
  const fat = parseFloat(document.getElementById('meal-fat').value) || 0;
  const carbs = parseFloat(document.getElementById('meal-carbs').value) || 0;
  const type = document.getElementById('meal-type').value;
  const desc = document.getElementById('meal-desc').value;
  const dateInput = document.getElementById('meal-date').value;

  if (!kcal) { showToast('⚠️ Insere pelo menos as calorias!'); return; }

  const d = dateInput || today();
  if (!state[currentUser].meals[d]) state[currentUser].meals[d] = [];
  state[currentUser].meals[d].push({ type, desc, kcal, prot, fat, carbs, time: new Date().toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' }), id: Date.now() });

  // update streak only for today
  if (d === today()) {
    const last = state[currentUser].lastLog;
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
    const yStr = yesterday.toISOString().split('T')[0];
    if (last === yStr || last === d) {
      if (last !== d) state[currentUser].streak = (state[currentUser].streak || 0) + 1;
    } else {
      state[currentUser].streak = 1;
    }
    state[currentUser].lastLog = d;
  }

  saveState();
  ['meal-kcal','meal-prot','meal-fat','meal-carbs','meal-desc'].forEach(id => document.getElementById(id).value = '');
  showToast(`✅ Refeição guardada em ${formatDate(d)}!`);
  renderAll();
}

function deleteMeal(date, id) {
  if (!state[currentUser].meals[date]) return;
  state[currentUser].meals[date] = state[currentUser].meals[date].filter(m => m.id !== id);
  if (state[currentUser].meals[date].length === 0) delete state[currentUser].meals[date];
  saveState();
  showToast('🗑️ Refeição removida');
  renderAll();
}

function getTodayTotals(user) {
  const d = today();
  const meals = state[user].meals[d] || [];
  return meals.reduce((acc, m) => ({
    kcal: acc.kcal + (m.kcal||0),
    prot: acc.prot + (m.prot||0),
    fat: acc.fat + (m.fat||0),
    carbs: acc.carbs + (m.carbs||0)
  }), { kcal: 0, prot: 0, fat: 0, carbs: 0 });
}

// ==================== WEIGHT ====================
function addWeight() {
  const w = parseFloat(document.getElementById('w-weight').value);
  if (!w) { showToast('⚠️ Insere o peso!'); return; }

  const dateInput = document.getElementById('w-date').value;
  const d = dateInput || today();

  state[currentUser].weights.push({
    date: d,
    weight: w,
    fat: parseFloat(document.getElementById('w-fat').value) || 0,
    muscle: parseFloat(document.getElementById('w-muscle').value) || 0,
    bmi: parseFloat(document.getElementById('w-bmi').value) || 0,
    water: parseFloat(document.getElementById('w-water').value) || 0,
    bmr: parseFloat(document.getElementById('w-bmr').value) || 0,
    visceral: parseFloat(document.getElementById('w-visceral').value) || 0,
    bodyage: parseFloat(document.getElementById('w-bodyage').value) || 0
  });

  // sort by date
  state[currentUser].weights.sort((a, b) => a.date.localeCompare(b.date));

  ['w-date','w-weight','w-fat','w-muscle','w-bmi','w-water','w-bmr','w-visceral','w-bodyage'].forEach(id => document.getElementById(id).value = '');
  saveState();
  showToast(`⚖️ Pesagem de ${formatDate(d)} guardada!`);
  renderAll();
}

// ==================== RENDER ====================
function renderAll() {
  renderHoje();
  renderPeso();
  renderHistorico();
  renderConquistas();
  renderDuelo();
  updateAddBtn();
}

function updateAddBtn() {
  const btn = document.getElementById('add-meal-btn');
  if (btn) {
    btn.className = `btn btn-${currentUser}`;
    btn.textContent = currentUser === 'ana' ? '💗 Guardar (Ana)' : '💙 Guardar (João)';
  }
}

function macroBar(val, target, color) {
  const pct = Math.min(100, Math.round(val / target * 100));
  const over = val > target;
  return `
    <div class="macro-bar-bg">
      <div class="macro-bar-fill" style="width:${pct}%;background:${over ? 'var(--red)' : color}"></div>
    </div>`;
}

function renderHoje() {
  const t = getTodayTotals(currentUser);
  const tgt = TARGETS[currentUser];
  const color = currentUser === 'ana' ? 'var(--ana)' : 'var(--joao)';
  const meals = state[currentUser].meals[today()] || [];

  const kcalPct = Math.min(100, Math.round(t.kcal / tgt.kcal * 100));
  const circumference = 2 * Math.PI * 40;
  const strokeDash = (kcalPct / 100) * circumference;
  const strokeColor = t.kcal > tgt.kcal ? 'var(--red)' : color;

  let mealsHtml = '';
  if (meals.length === 0) {
    mealsHtml = `<div class="empty-state"><div class="emoji">🍽️</div>Nenhuma refeição registada hoje</div>`;
  } else {
    mealsHtml = meals.map(m => `
      <div class="history-row">
        <div style="flex:1">
          <div style="font-size:12px;color:var(--text-soft)">${m.time} · ${m.type}</div>
          <div style="font-size:13px;font-weight:500;margin-top:2px">${m.desc || '—'}</div>
        </div>
        <div style="text-align:right;margin-right:10px">
          <div class="history-kcal">${m.kcal} kcal</div>
          <div style="font-size:11px;color:var(--text-soft)">P:${m.prot}g G:${m.fat}g H:${m.carbs}g</div>
        </div>
        <button onclick="deleteMeal('${today()}', ${m.id})" style="background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-soft);padding:4px" title="Apagar">🗑️</button>
      </div>`).join('');
  }

  document.getElementById('hoje-display').innerHTML = `
    <div class="card">
      <div class="card-title">Resumo de hoje · ${formatDate(today())}</div>
      <div class="kcal-display">
        <div class="kcal-circle">
          <svg width="100" height="100" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="40" fill="none" stroke="var(--border)" stroke-width="8"/>
            <circle cx="50" cy="50" r="40" fill="none" stroke="${strokeColor}" stroke-width="8"
              stroke-dasharray="${strokeDash} ${circumference}" stroke-linecap="round"/>
          </svg>
          <div class="kcal-circle-text">
            <div class="big">${kcalPct}%</div>
            <div class="small">kcal</div>
          </div>
        </div>
        <div class="kcal-info">
          <h3>${t.kcal} kcal</h3>
          <p>Alvo: ${tgt.kcal} kcal</p>
          <p style="margin-top:6px">Faltam: <strong>${Math.max(0, tgt.kcal - t.kcal)} kcal</strong></p>
        </div>
      </div>
      <div class="macro-grid">
        <div class="macro-item">
          <div class="macro-label"><span>Proteína</span><span>${t.prot}g/${tgt.prot}g</span></div>
          ${macroBar(t.prot, tgt.prot, '#5A9E6F')}
          <div style="font-size:11px;color:var(--text-soft);margin-top:3px">${Math.round(t.prot/tgt.prot*100)}% do alvo</div>
        </div>
        <div class="macro-item">
          <div class="macro-label"><span>Gordura</span><span>${t.fat}g/${tgt.fat}g</span></div>
          ${macroBar(t.fat, tgt.fat, '#E8A53A')}
          <div style="font-size:11px;color:var(--text-soft);margin-top:3px">${Math.round(t.fat/tgt.fat*100)}% do alvo</div>
        </div>
        <div class="macro-item">
          <div class="macro-label"><span>Hidratos</span><span>${t.carbs}g/${tgt.carbs}g</span></div>
          ${macroBar(t.carbs, tgt.carbs, '#7BA7C2')}
          <div style="font-size:11px;color:var(--text-soft);margin-top:3px">${Math.round(t.carbs/tgt.carbs*100)}% do alvo</div>
        </div>
        <div class="macro-item">
          <div class="macro-label"><span>Streak</span><span></span></div>
          <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:22px;margin-top:4px">
            🔥 ${state[currentUser].streak || 0}
          </div>
          <div style="font-size:11px;color:var(--text-soft);margin-top:2px">dias seguidos</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Refeições de hoje</div>
      ${mealsHtml}
    </div>
  `;
}

function renderPeso() {
  const weights = state[currentUser].weights;
  const tgt = TARGETS[currentUser];
  const color = currentUser === 'ana' ? 'var(--ana)' : 'var(--joao)';

  if (weights.length === 0) {
    document.getElementById('peso-display').innerHTML = `<div class="card"><div class="empty-state"><div class="emoji">⚖️</div>Sem pesagens registadas</div></div>`;
    return;
  }

  const latest = weights[weights.length - 1];
  const prev = weights.length > 1 ? weights[weights.length - 2] : null;
  const delta = prev ? (latest.weight - prev.weight).toFixed(1) : null;
  const totalLost = (tgt.startWeight - latest.weight).toFixed(1);
  const goal = tgt.goalWeight;
  const toGo = (latest.weight - goal).toFixed(1);
  const pct = Math.min(100, Math.max(0, Math.round((tgt.startWeight - latest.weight) / (tgt.startWeight - goal) * 100)));

  const deltaHtml = delta !== null
    ? `<div class="weight-delta" style="color:${parseFloat(delta) <= 0 ? 'var(--green)' : 'var(--red)'}">
        ${parseFloat(delta) <= 0 ? '▼' : '▲'} ${Math.abs(delta)} kg vs semana anterior
       </div>`
    : '';

  // History list
  const histList = [...weights].reverse().slice(0, 6).map(w => {
    const d = prev && w === latest ? `<span style="color:${parseFloat(delta)<=0?'var(--green)':'var(--red)'}">${parseFloat(delta)<=0?'▼':'▲'}${Math.abs(delta)}kg</span>` : '';
    return `<div class="history-row">
      <div class="history-date">${formatDate(w.date)}</div>
      <div class="history-kcal">${w.weight} kg</div>
      <div class="history-macros">${w.fat ? `Gord: ${w.fat}%` : ''} ${w.muscle ? `Musc: ${w.muscle}kg` : ''}</div>
      <div>${d}</div>
    </div>`;
  }).join('');

  // Metrics
  const metricsHtml = latest.fat ? `
    <div class="card">
      <div class="card-title">📊 Composição corporal</div>
      <div class="metrics-grid">
        ${latest.fat ? `<div class="metric-item"><div class="metric-name">% Gordura</div><div class="metric-val">${latest.fat}<span>%</span></div></div>` : ''}
        ${latest.muscle ? `<div class="metric-item"><div class="metric-name">Massa muscular</div><div class="metric-val">${latest.muscle}<span>kg</span></div></div>` : ''}
        ${latest.bmi ? `<div class="metric-item"><div class="metric-name">IMC</div><div class="metric-val">${latest.bmi}</div></div>` : ''}
        ${latest.water ? `<div class="metric-item"><div class="metric-name">% Água</div><div class="metric-val">${latest.water}<span>%</span></div></div>` : ''}
        ${latest.bmr ? `<div class="metric-item"><div class="metric-name">BMR</div><div class="metric-val">${latest.bmr}<span>kcal</span></div></div>` : ''}
        ${latest.visceral ? `<div class="metric-item"><div class="metric-name">Gordura visceral</div><div class="metric-val">${latest.visceral}</div></div>` : ''}
        ${latest.bodyage ? `<div class="metric-item"><div class="metric-name">Idade corporal</div><div class="metric-val">${latest.bodyage}<span>anos</span></div></div>` : ''}
      </div>
    </div>` : '';

  document.getElementById('peso-display').innerHTML = `
    <div class="card">
      <div class="weight-display">
        <div class="weight-big">${latest.weight}<span>kg</span></div>
        ${deltaHtml}
      </div>
      <div class="weight-progress">
        <div class="progress-header">
          <span>Início: ${tgt.startWeight}kg</span>
          <span style="font-family:'Syne',sans-serif;font-weight:700;color:${color}">${pct}% da meta</span>
          <span>Meta: ${goal}kg</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:12px;color:var(--text-soft)">
          <span>Perdido: <strong style="color:var(--green)">${totalLost > 0 ? totalLost : 0}kg</strong></span>
          <span>Falta perder: <strong>${toGo > 0 ? toGo : 0}kg</strong></span>
        </div>
      </div>
    </div>
    ${metricsHtml}
    <div class="card">
      <div class="card-title">Histórico de pesagens</div>
      ${histList || '<div class="empty-state">Sem histórico ainda</div>'}
    </div>
  `;
}

function renderHistorico() {
  const meals = state[currentUser].meals;
  const dates = Object.keys(meals).sort().reverse().slice(0, 14);

  if (dates.length === 0) {
    document.getElementById('historico-display').innerHTML = `<div class="card"><div class="empty-state"><div class="emoji">📅</div>Sem histórico ainda</div></div>`;
    return;
  }

  const tgt = TARGETS[currentUser];
  const color = currentUser === 'ana' ? 'var(--ana-deep)' : 'var(--joao-deep)';

  const rows = dates.map(d => {
    const t = meals[d].reduce((acc, m) => ({ kcal: acc.kcal+(m.kcal||0), prot: acc.prot+(m.prot||0), fat: acc.fat+(m.fat||0), carbs: acc.carbs+(m.carbs||0) }), {kcal:0,prot:0,fat:0,carbs:0});
    const ok = t.kcal <= tgt.kcal * 1.05;
    return `
      <div class="history-row">
        <div class="history-date">${formatDate(d)}</div>
        <div>
          <div class="history-kcal">${t.kcal} kcal</div>
          <div style="font-size:10px;color:var(--text-soft)">${Math.round(t.kcal/tgt.kcal*100)}% alvo</div>
        </div>
        <div class="history-macros">P:${Math.round(t.prot)}g · G:${Math.round(t.fat)}g · H:${Math.round(t.carbs)}g</div>
        <span class="badge ${ok ? 'badge-green' : 'badge-red'}">${ok ? '✓' : '↑'}</span>
      </div>`;
  }).join('');

  // weekly avg
  const allDays = dates.slice(0, 7);
  const weekTotal = allDays.reduce((sum, d) => {
    const t = meals[d]?.reduce((a, m) => a + (m.kcal||0), 0) || 0;
    return sum + t;
  }, 0);
  const weekAvg = allDays.length ? Math.round(weekTotal / allDays.length) : 0;

  document.getElementById('historico-display').innerHTML = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div>
          <div class="card-title" style="margin:0">Média semanal</div>
          <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:28px;margin-top:4px">${weekAvg} <span style="font-size:14px;font-weight:400;color:var(--text-soft)">kcal/dia</span></div>
        </div>
        <span class="badge ${weekAvg <= tgt.kcal ? 'badge-green' : 'badge-red'}" style="font-size:13px;padding:8px 14px">
          ${weekAvg <= tgt.kcal ? '✅ No alvo' : `↑ +${weekAvg - tgt.kcal} kcal`}
        </span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Últimos 14 dias</div>
      ${rows}
    </div>
  `;
}

const ACHIEVEMENTS = [
  { id: 'first_log', icon: '🌟', name: 'Primeiro registo', check: (u) => Object.keys(state[u].meals).length >= 1 },
  { id: 'streak_3', icon: '🔥', name: '3 dias seguidos', check: (u) => state[u].streak >= 3 },
  { id: 'streak_7', icon: '⚡', name: '7 dias seguidos', check: (u) => state[u].streak >= 7 },
  { id: 'streak_14', icon: '💪', name: '14 dias seguidos', check: (u) => state[u].streak >= 14 },
  { id: 'protein_king', icon: '🥩', name: 'Rei da proteína', check: (u) => { const t = getTodayTotals(u); return t.prot >= TARGETS[u].prot; }},
  { id: '1kg_lost', icon: '🎯', name: '1kg perdido', check: (u) => { const w = state[u].weights; return w.length >= 2 && TARGETS[u].startWeight - w[w.length-1].weight >= 1; }},
  { id: '3kg_lost', icon: '🏅', name: '3kg perdidos', check: (u) => { const w = state[u].weights; return w.length >= 2 && TARGETS[u].startWeight - w[w.length-1].weight >= 3; }},
  { id: '5kg_lost', icon: '🏆', name: 'Meta 1 atingida!', check: (u) => { const w = state[u].weights; return w.length >= 2 && TARGETS[u].startWeight - w[w.length-1].weight >= 5; }},
  { id: 'week_logs', icon: '📅', name: '7 dias registados', check: (u) => Object.keys(state[u].meals).length >= 7 },
];

function renderConquistas() {
  const color = currentUser === 'ana' ? 'var(--ana)' : 'var(--joao)';
  const unlocked = ACHIEVEMENTS.filter(a => a.check(currentUser)).length;

  const grid = ACHIEVEMENTS.map(a => {
    const ok = a.check(currentUser);
    return `<div class="achievement ${ok ? 'unlocked' : ''}">
      <div class="achievement-icon">${ok ? a.icon : '🔒'}</div>
      <div class="achievement-name">${a.name}</div>
    </div>`;
  }).join('');

  document.getElementById('conquistas-display').innerHTML = `
    <div class="card">
      <div class="card-title">Progresso</div>
      <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:32px">${unlocked}<span style="font-size:14px;font-weight:400;color:var(--text-soft)">/${ACHIEVEMENTS.length} conquistas</span></div>
      <div class="progress-bar-bg" style="margin-top:12px">
        <div class="progress-bar-fill" style="width:${Math.round(unlocked/ACHIEVEMENTS.length*100)}%;background:${color}"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">🏆 Conquistas</div>
      <div class="achievements-grid">${grid}</div>
    </div>
    <div class="card">
      <div class="card-title">🔥 Streak atual</div>
      <div class="streak-display">
        <div class="streak-icon">🔥</div>
        <div class="streak-info">
          <h3>${state[currentUser].streak || 0} dias</h3>
          <p>dias consecutivos com registo</p>
        </div>
      </div>
    </div>
  `;
}

function renderDuelo() {
  const ana = state.ana;
  const joao = state.joao;
  const tAna = getTodayTotals('ana');
  const tJoao = getTodayTotals('joao');

  const wAna = ana.weights[ana.weights.length - 1];
  const wJoao = joao.weights[joao.weights.length - 1];
  const lostAna = Math.max(0, TARGETS.ana.startWeight - wAna.weight);
  const lostJoao = Math.max(0, TARGETS.joao.startWeight - wJoao.weight);
  const pctAna = Math.round(lostAna / (TARGETS.ana.startWeight - TARGETS.ana.goalWeight) * 100);
  const pctJoao = Math.round(lostJoao / (TARGETS.joao.startWeight - TARGETS.joao.goalWeight) * 100);

  const streakAna = ana.streak || 0;
  const streakJoao = joao.streak || 0;

  const daysAna = Object.keys(ana.meals).length;
  const daysJoao = Object.keys(joao.meals).length;

  const unlockedAna = ACHIEVEMENTS.filter(a => a.check('ana')).length;
  const unlockedJoao = ACHIEVEMENTS.filter(a => a.check('joao')).length;

  function statRow(label, valA, valB, higherWins = false) {
    const aWins = higherWins ? valA > valB : valA < valB;
    const bWins = higherWins ? valB > valA : valB < valA;
    return `
      <div class="history-row">
        <div style="text-align:center;font-family:'Syne',sans-serif;font-weight:700;font-size:16px;flex:1;color:${aWins?'var(--ana-deep)':'var(--text-soft)'}">${valA}${aWins?'🏅':''}</div>
        <div style="text-align:center;font-size:11px;color:var(--text-soft);min-width:100px">${label}</div>
        <div style="text-align:center;font-family:'Syne',sans-serif;font-weight:700;font-size:16px;flex:1;color:${bWins?'var(--joao-deep)':'var(--text-soft)'}">${bWins?'🏅':''}${valB}</div>
      </div>`;
  }

  document.getElementById('duelo-display').innerHTML = `
    <div class="card">
      <div class="vs-row">
        <div style="text-align:center">
          <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--ana-deep)">💗 Ana</div>
          <div style="font-size:12px;color:var(--text-soft)">${wAna.weight}kg</div>
        </div>
        <div class="vs-text">VS</div>
        <div style="text-align:center">
          <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--joao-deep)">💙 João</div>
          <div style="font-size:12px;color:var(--text-soft)">${wJoao.weight}kg</div>
        </div>
      </div>

      <div class="card-title">Progresso para a meta</div>
      <div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
          <span style="color:var(--ana-deep)">Ana ${pctAna}%</span>
          <span>${lostAna.toFixed(1)}kg perdidos</span>
        </div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pctAna}%;background:var(--ana)"></div></div>
      </div>
      <div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
          <span style="color:var(--joao-deep)">João ${pctJoao}%</span>
          <span>${lostJoao.toFixed(1)}kg perdidos</span>
        </div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pctJoao}%;background:var(--joao)"></div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">⚔️ Estatísticas</div>
      ${statRow('Streak 🔥', streakAna + ' dias', streakJoao + ' dias', true)}
      ${statRow('Dias com registo', daysAna, daysJoao, true)}
      ${statRow('Conquistas 🏆', unlockedAna, unlockedJoao, true)}
      ${statRow('Kcal hoje', tAna.kcal, tJoao.kcal, false)}
      ${statRow('Proteína hoje', tAna.prot + 'g', tJoao.prot + 'g', true)}
    </div>
  `;
}

// ==================== TOAST ====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ==================== INIT ====================
// Set default dates to today
document.getElementById('meal-date').value = today();
document.getElementById('w-date').value = today();
renderAll();
</script>
</body>
</html>
